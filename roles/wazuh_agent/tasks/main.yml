---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Download Wazuh agent package
  ansible.builtin.get_url:
    url: https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.14.3-1_amd64.deb
    dest: /tmp/wazuh-agent_4.14.3-1_amd64.deb
    mode: '0644'

- name: Install Wazuh agent package
  ansible.builtin.command: >
    dpkg -i /tmp/wazuh-agent_4.14.3-1_amd64.deb
  environment:
    WAZUH_MANAGER: "{{ wazuh_server_ip }}"
    WAZUH_AGENT_NAME: "{{ wazuh_agent_name | default('ludus-agent') }}"

- name: Ensure Wazuh agent is enabled and running
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: true
    daemon_reload: yes
