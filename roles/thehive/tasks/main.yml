---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - wget
      - python3-pexpect
    state: present
    update_cache: yes

- name: Ensure thehive user exists
  ansible.builtin.user:
    name: thehive
    shell: /bin/bash
    create_home: yes

- name: Grant thehive user passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/thehive
    create: yes
    line: 'thehive ALL=(ALL) NOPASSWD:ALL'
    validate: 'visudo -cf %s'

- name: Download TheHive installation script
  ansible.builtin.get_url:
    url: https://scripts.download.strangebee.com/latest/sh/install_script.sh
    dest: /tmp/install_script.sh
    mode: '0755'

- name: Run TheHive installation script
  ansible.builtin.expect:
    command: sudo -u thehive /tmp/install_script.sh
    responses:
      '.*Do you want to continue\?.*': 'yes'
      '.*Select an option:.*': '2'
    timeout: 600
  register: thehive_install_output

- name: Save TheHive installation log
  ansible.builtin.copy:
    content: "{{ thehive_install_output.stdout | join('\n') }}"
    dest: /tmp/thehive_install.log
